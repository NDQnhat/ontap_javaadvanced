<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On Tap Java</title>
    <style>
        :root {
            --bg: #eef3fb;
            --paper: #ffffff;
            --text: #10223a;
            --muted: #5e6f86;
            --line: #d9e3f0;
            --accent: #0b5fff;
            --accent-2: #0a4de0;
            --basic: #099268;
            --medium: #f08c00;
            --hard: #e03131;
            --shadow: rgba(16, 34, 58, 0.08);
        }

        body.theme-dark {
            --bg: #0d1625;
            --paper: #16263b;
            --text: #e6edf8;
            --muted: #a9bdd7;
            --line: #2b3f5c;
            --accent: #4f8dff;
            --accent-2: #73a4ff;
            --basic: #2dbf8d;
            --medium: #ffaf3f;
            --hard: #ff6b6b;
            --shadow: rgba(0, 0, 0, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 0%, rgba(11, 95, 255, 0.16) 0%, transparent 45%),
                radial-gradient(circle at 100% 20%, rgba(9, 146, 104, 0.14) 0%, transparent 40%),
                var(--bg);
            font-family: "Segoe UI", Tahoma, sans-serif;
            font-size: 19px;
            line-height: 1.65;
            padding: 28px;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        .container {
            width: 100%;
            max-width: 1220px;
            margin: 0 auto;
        }

        .hero {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 24px var(--shadow);
            margin-bottom: 18px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 2rem;
            line-height: 1.2;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 1.06rem;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: var(--paper);
            color: var(--text);
            font-size: 1rem;
            font-weight: 700;
            padding: 12px 16px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            border-color: var(--accent-2);
        }

        button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .status {
            color: var(--muted);
            margin-bottom: 14px;
            font-size: 0.98rem;
            font-weight: 600;
        }

        details {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 14px;
            box-shadow: 0 6px 16px rgba(16, 34, 58, 0.05);
        }

        summary {
            list-style: none;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 1.07rem;
            font-weight: 800;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        .badge {
            flex: 0 0 auto;
            border-radius: 999px;
            padding: 5px 11px;
            color: #fff;
            font-size: 0.82rem;
            line-height: 1.2;
            margin-top: 3px;
        }

        .badge.coban {
            background: var(--basic);
        }

        .badge.trungbinh {
            background: var(--medium);
        }

        .badge.kho {
            background: var(--hard);
        }

        .answer {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px dashed var(--line);
            white-space: pre-wrap;
            font-size: 1.01rem;
        }

        .flashcard-wrap {
            display: none;
            margin-bottom: 14px;
        }

        .flashcard {
            width: 100%;
            min-height: 420px;
            perspective: 1400px;
        }

        .flashcard-inner {
            width: 100%;
            min-height: 420px;
            position: relative;
            transition: transform 0.5s ease;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 24px;
            backface-visibility: hidden;
            box-shadow: 0 10px 24px var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card-front-title {
            font-size: 1.35rem;
            line-height: 1.5;
            margin: 0;
        }

        .card-back {
            transform: rotateY(180deg);
            overflow-y: auto;
        }

        .hint {
            margin-top: auto;
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .flashcard-nav {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .counter {
            font-size: 1.02rem;
            font-weight: 800;
        }

        .empty {
            padding: 20px;
            border: 1px dashed var(--line);
            border-radius: 14px;
            color: var(--muted);
            background: color-mix(in srgb, var(--paper) 90%, transparent);
        }

        @media (max-width: 900px) {
            body {
                padding: 16px;
                font-size: 18px;
            }

            .hero {
                padding: 16px;
            }

            h1 {
                font-size: 1.52rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-row {
                width: 100%;
            }

            .btn-row button,
            #modeToggle,
            #themeToggle {
                flex: 1 1 calc(50% - 10px);
                min-height: 52px;
                font-size: 1rem;
            }

            summary {
                font-size: 1.04rem;
            }

            .flashcard,
            .flashcard-inner {
                min-height: 520px;
            }

            .card-face {
                padding: 16px;
            }

            .card-front-title {
                font-size: 1.2rem;
            }

            .flashcard-nav button {
                min-height: 50px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>On Tap Java</h1>
        <p class="subtitle">Du lieu JSON da duoc nhung truc tiep trong file, khong con fetch tu ontap.txt.</p>
    </div>

    <div class="controls">
        <div class="btn-row">
            <button class="filter-btn active" data-level="all">Tat ca</button>
            <button class="filter-btn" data-level="coban">Co ban</button>
            <button class="filter-btn" data-level="trungbinh">Trung binh</button>
            <button class="filter-btn" data-level="kho">Kho</button>
        </div>
        <div class="btn-row">
            <button id="themeToggle">Dark mode</button>
            <button id="modeToggle">Chuyen sang Flashcard</button>
        </div>
    </div>

    <div id="status" class="status"></div>

    <div id="listView"></div>

    <div id="flashcardWrap" class="flashcard-wrap">
        <div class="flashcard">
            <div id="flashcardInner" class="flashcard-inner">
                <div class="card-face card-front">
                    <span id="fcBadge" class="badge">Co ban</span>
                    <h3 id="fcQuestion" class="card-front-title"></h3>
                    <p class="hint">Cham vao the de xem dap an</p>
                </div>
                <div class="card-face card-back">
                    <span id="fcBadgeBack" class="badge">Co ban</span>
                    <div id="fcAnswer" class="answer"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="flashcardNav" class="flashcard-nav">
        <button id="prevBtn">Truoc</button>
        <div id="counter" class="counter"></div>
        <button id="nextBtn">Sau</button>
    </div>
</div>

<script>
    const data = [
  {
    "level": "coban",
    "question": "Câu 1: Exception trong Java là gì và tại sao chúng ta cần xử lý nó trong dự án thực tế?",
    "answer": "Exception là sự kiện bất thường xảy ra tại thời điểm Runtime, phá vỡ luồng thực thi bình thường của chương trình. Trong thực tế, ta cần xử lý để ứng dụng không bị dừng (crash) đột ngột, bảo vệ dữ liệu và hiển thị thông báo lỗi thân thiện cho người dùng."
  },
  {
    "level": "coban",
    "question": "Câu 2: Checked Exception và Unchecked Exception khác nhau như thế nào? Tại sao Java lại chia ra như vậy?",
    "answer": "Checked là các lỗi khách quan (mất mạng, file không tồn tại), Java bắt buộc phải xử lý (try-catch/throws) ngay khi viết code. Unchecked là lỗi do lập trình viên (chia cho 0, null pointer), Java không bắt buộc bắt lỗi vì đây là lỗi logic cần phải sửa code chứ không phải chỉ \"hứng\" lỗi. Lỗi Checked bắt buộc compiler phải kiểm tra và yêu cầu lập trình viên xử lý, trong khi Unchecked Exception kế thừa từ RuntimeException."
  },
  {
    "level": "coban",
    "question": "Câu 3: Tại sao việc dùng catch (Exception e) chung chung cho mọi trường hợp lại bị coi là một thiết kế tồi?",
    "answer": "Việc catch Exception (lớp cha cao nhất) sẽ \"nuốt\" luôn cả những lỗi hệ thống hoặc lỗi logic nghiêm trọng mà lẽ ra chương trình nên dừng lại để developer sửa (như NullPointerException). Lập trình viên nên catch các lỗi cụ thể (IOException, SQLException) để có phương án xử lý (recovery) phù hợp, vì catch chung chung khiến việc debug trở thành \"cực hình\"."
  },
  {
    "level": "coban",
    "question": "Câu 4: Phân biệt sự khác nhau cơ bản giữa từ khóa throw và throws trong xử lý ngoại lệ?",
    "answer": "Từ khóa throw (hành động) nằm trong thân hàm, dùng để chủ động kích hoạt và ném ra một đối tượng ngoại lệ cụ thể (VD: throw new IllegalArgumentException()). Từ khóa throws (khai báo) nằm sau tên hàm (ở chữ ký hàm), dùng để cảnh báo cho người gọi hàm biết rằng hàm này có thể xảy ra lỗi."
  },
  {
    "level": "coban",
    "question": "Câu 5: Khối finally có vai trò gì và lợi ích thực sự của try-with-resources so với việc dùng finally là gì?",
    "answer": "Khối finally là khối lệnh luôn luôn được chạy dù có xảy ra lỗi hay không, thường được dùng để \"dọn dẹp hiện trường\", giải phóng các tài nguyên hệ thống (như đóng Scanner, File, Connection DB) để tránh rò rỉ bộ nhớ. Tuy nhiên, try-with-resources ưu việt hơn vì nó giúp code ngắn gọn, tự động đóng các resource theo đúng thứ tự. Đặc biệt, nó xử lý được \"Suppressed Exceptions\" để tránh việc lỗi khi đang đóng resource đè mất lỗi chính của chương trình."
  },
  {
    "level": "coban",
    "question": "Câu 6: Tại sao nên tự định nghĩa Custom Exception thay vì dùng Exception mặc định của Java?",
    "answer": "Custom Exception (ngoại lệ tùy chỉnh) giúp tăng tính rõ ràng, phân loại lỗi và mô tả các lỗi nghiệp vụ cụ thể của dự án (ví dụ: InvalidAgeException, AccountBalanceNotEnoughException). Việc này giúp việc debug và bảo trì dễ dàng hơn.\nPhần 2: Unit Test"
  },
  {
    "level": "coban",
    "question": "Câu 7: Lợi ích thiết thực nhất của việc viết Unit Test là gì? Tại sao Dev phải tự viết trong khi đằng nào QA/Tester cũng sẽ test lại toàn bộ hệ thống?",
    "answer": "Unit Test giúp khẳng định chất lượng sản phẩm, tăng tốc độ kiểm thử tự động, dễ dàng quản lý rủi ro và giảm chi phí bảo trì. Trong khi Tester kiểm tra hệ thống từ bên ngoài (Black-box/End-to-End), Unit Test kiểm tra các logic hàm từ bên trong (White-box) ngay tại thời điểm code. Việc này giúp phát hiện bug sớm, dễ dàng refactor code sau này mà không sợ làm hỏng logic cũ."
  },
  {
    "level": "coban",
    "question": "Câu 8: Hãy kể tên 4 bước chuẩn để triển khai một Unit Test (Mô hình 4 bước)?",
    "answer": "4 bước gồm: Arrange (Chuẩn bị dữ liệu/mock) -> Act (Gọi hàm cần test) -> Assert (Kiểm tra kết quả thực tế với mong đợi) -> Verify (Kiểm tra tương tác với mock)."
  },
  {
    "level": "coban",
    "question": "Câu 9: Trong JUnit, hàm assertEquals() được sử dụng với mục đích gì?",
    "answer": "assertEquals() là một assertion thông dụng dùng để so sánh sự bằng nhau giữa 2 giá trị: giá trị mong đợi (expected) và giá trị thực tế sinh ra từ code (actual).\nPhần 3: Java 8 & Java 17"
  },
  {
    "level": "coban",
    "question": "Câu 10: Điểm thay đổi tư duy lớn nhất khi Java 8 ra mắt là gì?",
    "answer": "Java 8 đánh dấu sự chuyển đổi tư duy từ lập trình hướng đối tượng (OOP) thuần túy sang việc kết hợp với Lập trình hướng hàm (Functional Programming) theo tiêu chí \"Write less, do more\"."
  },
  {
    "level": "coban",
    "question": "Câu 11: Functional Interface là gì? Tại sao nó bắt buộc chỉ được có duy nhất 1 abstract method?",
    "answer": "Functional Interface là Interface chỉ có duy nhất một phương thức trừu tượng (quy tắc SAM) được thiết kế riêng để dùng với Lambda. Nó chỉ được phép có 1 abstract method vì khi ta viết biểu thức Lambda, Java cần biết đích xác biểu thức đó đang implement cho phương thức duy nhất nào, nếu có 2 thì compiler sẽ không thể \"đoán\" được."
  },
  {
    "level": "coban",
    "question": "Câu 12: Biểu thức Lambda giải quyết vấn đề gì và Method Reference có ưu điểm gì so với Lambda thông thường?",
    "answer": "Biểu thức Lambda giúp biểu diễn các phương thức của Interface dưới dạng các hàm ẩn danh ngắn gọn, giúp code sạch hơn và loại bỏ việc phải viết các class ẩn danh (anonymous class) dài dòng như trước đây. Method Reference (ví dụ System.out::println) có ưu điểm chính là làm code ngắn gọn, dễ đọc và trực quan hơn (tính khai báo cao) khi ta chỉ muốn gọi lại một method đã có sẵn mà không cần thêm bất kỳ logic biến đổi nào khác."
  },
  {
    "level": "coban",
    "question": "Câu 13: Tại sao Java 8 lại cho phép viết phương thức default có thân hàm bên trong Interface? Điều này có đi ngược lại với tính trừu tượng không?",
    "answer": "Việc này không phá vỡ tính trừu tượng mà để giải quyết bài toán \"Tương thích ngược\" (Backward Compatibility). Nhờ có default method, người ta có thể thêm phương thức mới vào Interface mà không làm hỏng (break) mã nguồn của các lớp đang implement Interface đó từ trước."
  },
  {
    "level": "coban",
    "question": "Câu 14: Stream API mang lại ưu điểm gì và hai phương thức filter(), map() khác nhau thế nào?",
    "answer": "Stream API cung cấp cách xử lý tập hợp dữ liệu theo phong cách hướng hàm, giúp thao tác gọn gàng, tuần tự hoặc dễ dàng xử lý đa luồng (parallelStream) để tăng hiệu suất phần mềm. Phương thức filter() dùng để lọc và giữ lại các phần tử thỏa mãn điều kiện nhất định, còn map() dùng để chuyển đổi (biến đổi) dữ liệu từ kiểu này sang kiểu/kết quả khác."
  },
  {
    "level": "coban",
    "question": "Câu 15: Đối tượng Optional<T> sinh ra để giải quyết vấn đề gì? Nó có thay thế hoàn toàn được if (obj != null) không?",
    "answer": "Optional là một vùng chứa (container) có thể chứa giá trị hoặc rỗng, dùng làm kiểu trả về cho phương thức để thông báo cho người gọi rằng kết quả có thể rỗng. Nó ép buộc lập trình viên phải kiểm tra dữ liệu trước khi dùng, từ đó triệt tiêu lỗi NullPointerException lúc runtime. Tuy nhiên, không nên dùng nó chỉ để bọc một biến local thay cho kiểm tra null vì có thể gây lỗi NoSuchElementException nếu dùng .get() ngay lập tức."
  },
  {
    "level": "coban",
    "question": "Câu 16: DateTime API mới (LocalDateTime) có ưu điểm gì cốt lõi so với java.util.Date ngày xưa?",
    "answer": "LocalDateTime là Immutable (bất biến) và Thread-safe. Ngoài ra, các hàm của nó (cộng trừ ngày tháng) rõ ràng, dễ dùng và không bị lỗi đếm tháng từ 0 (Zero-based month) ngớ ngẩn như Date cũ."
  },
  {
    "level": "coban",
    "question": "Câu 17: Tính năng Record trong Java 17 sinh ra để giải quyết sự cồng kềnh nào của các class POJO/Entity truyền thống?",
    "answer": "Record sinh ra để tạo các Data Class một cách nhanh chóng, thay vì phải viết hàng chục dòng code cho Constructor, Getter, Setter, equals(), hashCode(), toString(), ta chỉ cần 1 dòng khai báo Record. Nó giúp code gọn gàng, loại bỏ boilerplate code và đảm bảo tính bất biến (Immutable) của dữ liệu mang đi.\nPhần 4: Đa luồng (Multi-threading)"
  },
  {
    "level": "coban",
    "question": "Câu 18: Thread (Luồng) là gì và tại sao ứng dụng thực tế lại cần MultiThreading?",
    "answer": "Thread là đơn vị thực thi một nhiệm vụ cụ thể. Việc dùng MultiThreading (Đa luồng) giúp ứng dụng chia nhỏ các công việc ra để chạy song song, tận dụng tối đa CPU nhiều nhân và giúp ứng dụng mượt mà hơn."
  },
  {
    "level": "coban",
    "question": "Câu 19: Hãy nêu 5 trạng thái trong vòng đời của một Thread.",
    "answer": "Vòng đời Thread gồm: New (Khởi tạo), Runnable (Sẵn sàng chạy), Blocked (Bị chặn), Waiting / Timed Waiting (Chờ đợi), và Terminated (Kết thúc)."
  },
  {
    "level": "coban",
    "question": "Câu 20: Sự khác biệt giữa việc gọi start() và run() khi kích hoạt một Thread là gì?",
    "answer": "Gọi run() chỉ đơn thuần là gọi một method bình thường chạy trên Thread hiện tại (Main Thread). Chỉ khi gọi start(), JVM mới thực sự tạo ra một tiến trình con mới và thực thi đa luồng song song."
  },
  {
    "level": "coban",
    "question": "Câu 21: Sự khác biệt lớn nhất giữa Thread.sleep() và Object.wait() về cơ chế nhả khóa (Lock) là gì?",
    "answer": "Khi gọi sleep(), thread tạm dừng nhưng vẫn ôm chặt Lock không nhả. Khi gọi wait(), thread sẽ nhả Lock ra để các thread khác có thể sử dụng tài nguyên đó, và nó sẽ chờ đến khi được notify()."
  },
  {

    let allItems = data.slice();
    let filteredItems = allItems.slice();
    let currentFilter = "all";
    let mode = "list";
    let currentIndex = 0;

    const listView = document.getElementById("listView");
    const flashcardWrap = document.getElementById("flashcardWrap");
    const flashcardNav = document.getElementById("flashcardNav");
    const flashcardInner = document.getElementById("flashcardInner");
    const modeToggle = document.getElementById("modeToggle");
    const themeToggle = document.getElementById("themeToggle");
    const status = document.getElementById("status");

    const THEME_KEY = "ontap-theme";

    function getLevelLabel(level) {
        if (level === "coban") return { text: "Co ban", className: "coban" };
        if (level === "trungbinh") return { text: "Trung binh", className: "trungbinh" };
        return { text: "Kho", className: "kho" };
    }

    function applyTheme(theme) {
        document.body.classList.toggle("theme-dark", theme === "dark");
        themeToggle.textContent = theme === "dark" ? "Light mode" : "Dark mode";
    }

    function initTheme() {
        const saved = localStorage.getItem(THEME_KEY);
        if (saved === "dark" || saved === "light") {
            applyTheme(saved);
            return;
        }
        const preferredDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        applyTheme(preferredDark ? "dark" : "light");
    }

    function toggleTheme() {
        const next = document.body.classList.contains("theme-dark") ? "light" : "dark";
        localStorage.setItem(THEME_KEY, next);
        applyTheme(next);
    }

    function updateStatus() {
        const total = allItems.length;
        const showing = filteredItems.length;
        status.textContent = "Tong so cau hoi: " + total + ". Dang hien thi: " + showing + ".";
    }

    function applyFilter() {
        filteredItems = currentFilter === "all"
            ? allItems.slice()
            : allItems.filter(function (item) { return item.level === currentFilter; });
        currentIndex = 0;
        updateStatus();
        if (mode === "list") renderList();
        else renderFlashcard();
    }

    function renderList() {
        listView.style.display = "block";
        flashcardWrap.style.display = "none";
        flashcardNav.style.display = "none";

        if (!filteredItems.length) {
            listView.innerHTML = '<div class="empty">Khong co noi dung phu hop bo loc.</div>';
            return;
        }

        listView.innerHTML = "";

        filteredItems.forEach(function (item) {
            const levelMeta = getLevelLabel(item.level);
            const details = document.createElement("details");

            const summary = document.createElement("summary");
            const badge = document.createElement("span");
            badge.className = "badge " + levelMeta.className;
            badge.textContent = levelMeta.text;

            const question = document.createElement("span");
            question.textContent = item.question;

            summary.appendChild(badge);
            summary.appendChild(question);

            const answer = document.createElement("div");
            answer.className = "answer";
            answer.textContent = item.answer;

            details.appendChild(summary);
            details.appendChild(answer);
            listView.appendChild(details);
        });
    }

    function renderFlashcard() {
        listView.style.display = "none";
        flashcardWrap.style.display = "block";
        flashcardNav.style.display = "flex";

        if (!filteredItems.length) {
            document.getElementById("fcQuestion").textContent = "Khong co du lieu";
            document.getElementById("fcAnswer").textContent = "Khong co noi dung phu hop bo loc.";
            document.getElementById("counter").textContent = "0 / 0";
            return;
        }

        const item = filteredItems[currentIndex];
        const levelMeta = getLevelLabel(item.level);
        const fcBadge = document.getElementById("fcBadge");
        const fcBadgeBack = document.getElementById("fcBadgeBack");

        fcBadge.className = "badge " + levelMeta.className;
        fcBadgeBack.className = "badge " + levelMeta.className;
        fcBadge.textContent = levelMeta.text;
        fcBadgeBack.textContent = levelMeta.text;

        document.getElementById("fcQuestion").textContent = item.question;
        document.getElementById("fcAnswer").textContent = item.answer;
        document.getElementById("counter").textContent = (currentIndex + 1) + " / " + filteredItems.length;
        flashcardInner.classList.remove("flipped");
    }

    document.querySelectorAll(".filter-btn").forEach(function (btn) {
        btn.addEventListener("click", function (event) {
            document.querySelectorAll(".filter-btn").forEach(function (b) {
                b.classList.remove("active");
            });
            event.currentTarget.classList.add("active");
            currentFilter = event.currentTarget.getAttribute("data-level");
            applyFilter();
        });
    });

    modeToggle.addEventListener("click", function () {
        mode = mode === "list" ? "flashcard" : "list";
        modeToggle.textContent = mode === "list" ? "Chuyen sang Flashcard" : "Chuyen sang Danh sach";
        if (mode === "list") renderList();
        else renderFlashcard();
    });

    themeToggle.addEventListener("click", toggleTheme);

    flashcardInner.addEventListener("click", function () {
        flashcardInner.classList.toggle("flipped");
    });

    document.getElementById("prevBtn").addEventListener("click", function () {
        if (!filteredItems.length) return;
        currentIndex = Math.max(0, currentIndex - 1);
        renderFlashcard();
    });

    document.getElementById("nextBtn").addEventListener("click", function () {
        if (!filteredItems.length) return;
        currentIndex = Math.min(filteredItems.length - 1, currentIndex + 1);
        renderFlashcard();
    });

    initTheme();
    applyFilter();
    renderList();
</script>
</body>
</html>
